<!DOCTYPE html>
<html>

<head>
    <title>Dynamic CSS template buinding</title>
    <script defer>
        function onClickChangeColor() {
            debugger;
            alert("clicked");
            var divResult = document.getElementById("divResult");
            divResult.style.backgroundColor = "green";
            divResult.style.borderStyle = "double";
            divResult.style.padding = "25px";
        }

    </script>
    <style>
        #divResult {
            background-color: black;
            color: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="divResult">This info has background colour.</div>
    <button id="btnResult" onclick="onClickChangeColor()">Click</button>
</body>

</html>
