<!DOCTYPE html>
<htm>

    <head>
        <title>Amazon sign-In</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Calibri, sans-serif;
                background-color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .container {
                text-align: center;
                background: #f2f2f2;
                padding: 40px;
                border-radius: 8px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            }

            div {
                text-align: center;
            }

            image {
                align-items: center;
                text-align: center;

                display: block;
                margin: 20px auto;
            }


            .logo {
                font-size: 32px;
                font-weight: bold;
                color: #ff9900;
                margin-bottom: 20px;
            }

            .logo span {
                color: #000;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            input[type="text"],
            input[type="email"] {
                padding: 10px;
                font-size: 16px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }

            button {
                padding: 10px;
                font-size: 16px;
                background-color: #ff9900;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                color: #fff;
                font-weight: bold;
            }

            button:hover {
                background-color: #e68a00;
            }
        </style>
    </head>

    <body>

        <div class="logo">
            <a href="https://www.amazon.in/ref=ap_frn_logo">
                <div style="display: flex; padding-left: 130px;">
                    <img height="80px" width="120px" class="vertical-center"
                        src="https://tse2.mm.bing.net/th/id/OIP.YdkQGmhB9c2Sr84FeDD9egHaEK?pid=Api&P=0&h=180" ;
                        margin="0px">
            </a><span><sub><sub>.in</sub></sub></span>
        </div>
        </div>

        </div>
        <div style="width: 323px;" class="container">
            <div class="info">
                <h1 style="font-weight: 400; ">Sign in or create account</h1>
                <form>
                    <strong>
                        <labe style="font-size: 18px;">Enter mobile number or email</label><br>
                    </strong>
                    <input style="height: 30px; width: 310px; " placeholder="IN +91"><br>
                    <button class="vertical-center" id="Continue">Continue</button>
                    <p>By continuing, you agree to Amazon's <a
                            href="https://www.amazon.in/gp/help/customer/display.html/ref=ap_signin_notification_condition_of_use?nodeId=GLSBYFE9MGKKQXXM&ie=UTF8&ref_=ap_signin_notification_condition_of_use">Conditions
                            of Use</a>and <a
                            href="https://www.amazon.in/gp/help/customer/display.html/ref=ap_signin_notification_privacy_notice?nodeId=GX7NJQ4ZB8MHFRNJ&ie=UTF8&ref_=ap_signin_notification_privacy_notice">Privacy
                            Notice.</a></p>
                </form>
                <hr width="300px">
                <p> Buying for work?</p>
                <p>Create a fresh business account</p>
            </div>
        </div><br>
        <hr>
        <a style="padding-right:15px; text-align: center;padding-left: 60px;"
            href="https://www.amazon.in/gp/help/customer/display.html/ref=ap_desktop_footer_cou?nodeId=GLSBYFE9MGKKQXXM&ie=UTF8&ref_=ap_desktop_footer_cou">Contact
            of use</a>
        <a style="padding-right:15px; text-align: center;"
            href="https://www.amazon.in/gp/help/customer/display.html/ref=ap_desktop_footer_privacy_notice?nodeId=GX7NJQ4ZB8MHFRNJ&ie=UTF8&ref_=ap_desktop_footer_privacy_notice">Privacy
            Notice</a>
        <a href="https://www.amazon.in/gp/help/customer/display.html?ie=UTF8&nodeId=508510">Help</a>
    </body>
</htm>
