<!DOCTYPE html>
<html>
    <head>
        <title>Dynamic font size</title>
        <script defer>
function onClickChange(){
    debugger;
    var size=document.getElementById("txtFontSize").value
    document.getElementById("txtName").style.fontSize=size+"px"
}
 </script>
    </head>
    <body>
            <label id="lblFontSize">Font size</label>
            <input id="txtFontSize" type="number"><br>
        <button id="btnChange" onclick="onClickChange()">Change</button>
        <p id="txtName">This is to check the font size of the paragraph.</p>
    </body>
</html>
